<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>СМС по сокращению</title>
<style>
body{margin:0;background:#f6f7fb;color:#1f2937;font-family:Arial,sans-serif}.wrap{max-width:900px;margin:0 auto;padding:24px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(15,23,42,.05)}h1{margin:0 0 8px;font-size:25px}.sub{color:#6b7280;margin:0 0 18px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}button{border:0;border-radius:11px;padding:12px 16px;font-size:15px;font-weight:700;cursor:pointer}.primary{background:#1f6feb;color:#fff}.copy{background:#1f7a4c;color:#fff}.secondary{background:#e5e7eb;color:#1f2937}textarea{box-sizing:border-box;width:100%;min-height:460px;border:1px solid #d1d5db;border-radius:12px;padding:14px;font:15px/1.5 Arial,sans-serif;resize:vertical}.status{font-size:13px;color:#6b7280;margin-top:10px}iframe{display:none}@media(max-width:600px){.wrap{padding:14px}.actions button{width:100%}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>СМС по сокращению</h1>
<p class="sub">Группировка по прежнему подразделению: количество, удалёнка, фамилии и сокращаемые вакансии.</p>
<div class="actions"><button class="primary" id="generate">Сформировать СМС</button><button class="copy" id="copy">Скопировать</button><button class="secondary" id="refresh">Обновить данные</button></div>
<textarea id="out" placeholder="Здесь появится готовый текст"></textarea>
<div class="status" id="status">Загрузка актуального дашборда…</div>
</div></div>
<iframe id="dash" src="./?sms_source=1"></iframe>
<script>
const frame=document.getElementById('dash'),out=document.getElementById('out'),statusEl=document.getElementById('status');
let rows=[];
const clean=v=>String(v??'').replace(/\s+/g,' ').trim();
function initials(name){const p=clean(name).split(' ').filter(Boolean);return p.length<2?clean(name):p[0]+' '+p.slice(1).map(x=>x[0]+'.').join('');}
function isRemote(x){const t=[x.rem,x.m,x.hrn].map(clean).join(' ').toLowerCase();return /удал[её]н|дистанц/.test(t)||['да','1','true'].includes(clean(x.rem).toLowerCase());}
function department(x){return clean(x.od)||clean(x.nd)||clean(x.d)||clean(x.b)||'Подразделение не указано';}
function extract(){try{const html=frame.contentDocument.documentElement.innerHTML;const m=html.match(/const D=(\[.*?\]);\s*const HALF_EXTRA=/s);if(!m)throw new Error('массив сотрудников не найден');rows=JSON.parse(m[1]);statusEl.textContent='Данные загружены: '+rows.length+' строк.';return true}catch(e){statusEl.textContent='Ожидание загрузки дашборда…';return false;}}
function generate(){if(!rows.length&&!extract()){alert('Дашборд ещё загружается. Повторите через несколько секунд.');return;}
 const reduced=rows.filter(x=>clean(x.s).toLowerCase()==='сокращение'&&!/^вакансия/i.test(clean(x.f)));
 const reducedVac=rows.filter(x=>{const all=[x.f,x.s,x.m,x.hrn].map(clean).join(' ').toLowerCase();return /^вакансия/i.test(clean(x.f))&&all.includes('сокращ');});
 const groups=new Map();
 for(const x of [...reduced,...reducedVac]){const dep=department(x);if(!groups.has(dep))groups.set(dep,{people:[],vac:[],remote:0});const g=groups.get(dep);if(/^вакансия/i.test(clean(x.f))){g.vac.push(clean(x.f));}else{g.people.push(clean(x.f));if(isRemote(x))g.remote++;}}
 const sorted=[...groups.entries()].sort((a,b)=>a[0].localeCompare(b[0],'ru'));
 let lines=['По сокращению:'];let n=1,totalPeople=0,totalRemote=0,totalVac=0;
 for(const [dep,g] of sorted){totalPeople+=g.people.length;totalRemote+=g.remote;totalVac+=g.vac.length;let s=`${n}. ${dep} — ${g.people.length} чел.`;if(g.remote)s+=` (удалёнка — ${g.remote})`;if(g.people.length)s+=`: ${g.people.map(initials).join(', ')}`;if(g.vac.length)s+=`; вакансии под сокращение — ${g.vac.length}: ${g.vac.join(', ')}`;lines.push(s+'.');n++;}
 lines.push(`Итого: ${totalPeople} чел., удалёнка — ${totalRemote}, вакансии под сокращение — ${totalVac}.`);out.value=lines.join('\n\n');statusEl.textContent='СМС сформирована по актуальным данным дашборда.';
}
frame.addEventListener('load',()=>{let tries=0;const t=setInterval(()=>{if(extract()||++tries>40)clearInterval(t)},500)});
document.getElementById('generate').onclick=generate;
document.getElementById('copy').onclick=async()=>{if(!out.value)generate();try{await navigator.clipboard.writeText(out.value);statusEl.textContent='Текст скопирован.'}catch(e){out.select();document.execCommand('copy');statusEl.textContent='Текст скопирован.'}};
document.getElementById('refresh').onclick=()=>{rows=[];statusEl.textContent='Обновление…';frame.src='./?sms_source='+Date.now()};
</script>
</body>
</html>
