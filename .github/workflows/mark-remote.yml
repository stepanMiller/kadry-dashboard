name: Update dashboard staff flags

on:
  push:
    paths:
      - '.github/workflows/mark-remote.yml'

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply final corrections for 23.07.2026
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          start = '  // PATCH_23_07_START\n'
          end = '  // PATCH_23_07_END\n'
          if start in s and end in s:
              left, rest = s.split(start, 1)
              _, right = rest.split(end, 1)
              s = left + right

          marker = '  const addon=`'
          if marker not in s:
              raise SystemExit('Insertion marker not found in index.html')

          patch = r'''  // PATCH_23_07_START
          html=html.replace('актуальность 17.07.2026','актуальность 23.07.2026');
          html=html.replace('актуальность 08.07.2026','актуальность 23.07.2026');
          {
            let vacancy141Seen=false;
            const patchArray=(name,edit)=>{
              const re=new RegExp('const '+name+'=(\\[.*?\\]);','s');
              html=html.replace(re,(all,json)=>'const '+name+'='+JSON.stringify(edit(JSON.parse(json)))+';');
            };
            const normalize=(arr)=>{
              arr=arr.filter(x=>String(x.f||'').trim()!=='Матросов Александр Николаевич');
              for(const x of arr){
                const name=String(x.f||'').trim();
                const lname=name.toLowerCase();
                const position=(String(x.np||'')+' '+String(x.op||'')).toLowerCase();
                const n=Number(x.n);
                if(name==='Мефёд Елена Геннадьевна'){
                  x.s='сокращение';
                  x.z='Попов';
                  x.zf='Попов Антон Михайлович';
                  x.m='Сокращение. Уведомление выдано 29.06.2026.';
                  x.hrn='Сокращение: уведомление выдано 29.06.2026. Приём 09.02.2026; Боброва Е.И. уволена 06.02.2026.';
                }
                if(n===122 && lname.includes('вакан') && (lname.includes('аналитик')||position.includes('аналитик'))){
                  x.s='вакансия';
                  x.z='Попов';
                  x.zf='Попов Антон Михайлович';
                  x.m='Вакансия главного аналитика, позиция № 122 реестра от 17.07.2026. Под сокращение не идёт.';
                  x.hrn='Соломина Т.М. уволена 15.06.2026.';
                }
                if(n===141 && (lname.includes('вакан')||String(x.id||'').includes('141'))){
                  vacancy141Seen=true;
                  Object.assign(x,{
                    id:'VAC-SRC-141',
                    z:'Вне распределения по замам',
                    zf:'Без закрепления за заместителем',
                    b:'Отдел сопровождения',
                    d:'Отдел сопровождения',
                    f:'Вакансия — главный аналитик',
                    s:'сокращение',
                    r:1,
                    i:null,
                    m:'Вакансия главного аналитика, позиция № 141 реестра от 17.07.2026. Введена 01.05.2026. Идёт под сокращение; к блоку Попова не относится.',
                    op:null,
                    od:null,
                    sec:null,
                    nd:'отдел сопровождения',
                    np:'главный аналитик',
                    o:null,
                    rem:null,
                    hrn:'Вакансия введена 01.05.2026; добавлена в реестр 22.06.2026.',
                    hd:null
                  });
                }
              }
              return arr;
            };
            patchArray('D',normalize);
            patchArray('HALF_EXTRA',normalize);
            patchArray('VACANCIES_SOURCE',arr=>{
              arr=normalize(arr);
              if(!vacancy141Seen){
                arr.push({n:141,id:'VAC-SRC-141',z:'Вне распределения по замам',zf:'Без закрепления за заместителем',b:'Отдел сопровождения',d:'Отдел сопровождения',f:'Вакансия — главный аналитик',s:'сокращение',r:1,i:null,m:'Вакансия главного аналитика, позиция № 141 реестра от 17.07.2026. Введена 01.05.2026. Идёт под сокращение; к блоку Попова не относится.',op:null,od:null,sec:null,nd:'отдел сопровождения',np:'главный аналитик',o:null,rem:null,hrn:'Вакансия введена 01.05.2026; добавлена в реестр 22.06.2026.',hd:null});
                vacancy141Seen=true;
              }
              return arr;
            });
          }
          // PATCH_23_07_END
          '''

          s = s.replace(marker, patch + marker, 1)
          s = s.replace('Кадровый_дашборд_17-07-2026.xls', 'Кадровый_дашборд_23-07-2026.xls')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Обновить кадровый дашборд на 23.07.2026"
          git push
