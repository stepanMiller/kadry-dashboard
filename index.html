<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кадровый мониторинг</title>
</head>
<body>
<div style="font-family:Arial,sans-serif;padding:40px">Загрузка дашборда…</div>
<script>
(async()=>{
  const files=[
    'payload/exact08.part01.b64',
    'payload/exact08.part02.b64',
    'payload/exact08.part03.b64',
    'payload/exact08.part04.b64',
    'payload/exact08.part05.b64'
  ];
  const parts=await Promise.all(files.map(f=>fetch(f,{cache:'no-store'}).then(r=>{if(!r.ok) throw new Error(`${f}: ${r.status}`); return r.text();})));
  const bytes=Uint8Array.from(atob(parts.join('')),c=>c.charCodeAt(0));
  let html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();

  html=html.replace('актуальность 08.07.2026','актуальность 17.07.2026');

  html=html.replace(/const D=(\[.*?\]);\nconst HALF_EXTRA=/s,(all,json)=>{
    let D=JSON.parse(json);

    const byName=name=>D.find(x=>x.f===name);

    for(const x of D){
      if(x.f==='Максаев Максим Вадимович'){
        x.z='Попов';
        x.zf='Попов Антон Михайлович';
        x.b='ТКО / Отдел сопровождения';
        x.d='ТКО / Отдел сопровождения';
        x.m='Отнесён к блоку Попова по управленческой сверке.';
      }
      if(x.f==='Мефёд Елена Геннадьевна'){
        x.s='сокращение';
        x.m='Включена в список на сокращение по состоянию на 15.07.2026. Уведомление выдано 29.06.2026.';
        x.hrn='Сокращение: уведомление выдано 29.06.2026. Приём 09.02.2026; Боброва Е.И. уволена 06.02.2026.';
      }
    }
    D=D.filter(x=>!(x.id==='EMP-0163' && (x.f==='Вакансия главного аналитика'||x.f==='Вакансия 2')));

    let x=D.find(x=>x.id==='EMP-0055') || D.find(x=>x.f==='Вакансия' && x.z==='УпрВнешКомм');
    if(x){
      Object.assign(x,{
        f:'Соломеннова Д.В.',s:'работает',r:1,z:'УпрВнешКомм',
        zf:'Бурдуковская Р.З. (Упр. внешних коммуникаций и защиты информации)',
        b:'Сектор внешних коммуникаций / отдел внешних коммуникаций',d:'отдел внешних коммуникаций',
        op:'Старший инспектор',od:'4. Управление информационного планирования и внешних коммуникаций',
        sec:'Сектор внешних коммуникаций',nd:'отдел внешних коммуникаций',np:'главный специалист',
        o:'00ЗК-000109 от 18.07.2025',rem:null,hd:'2025-07-18',
        m:'Позиция № 8 реестра от 17.07.2026. Перевод на должность главного специалиста с должности ведущего специалиста 09.09.2025.',
        hrn:'Перевод на должность главного специалиста с должности ведущего специалиста 09.09.2025.'
      });
    }

    x=byName('Суслова Юлия Ивановна');
    if(x){
      Object.assign(x,{
        f:'Вакансия — ведущий специалист',s:'вакансия',r:1,
        op:'Старший инспектор',od:'10. Управление по развитию цифровых сервисов',sec:'Сектор ЦОД',
        nd:'отдел сопровождения',np:'ведущий специалист',o:'00ЗК-000017 от 17.03.2026',rem:null,
        m:'Позиция № 41 реестра от 17.07.2026. Освободилась после перевода Сусловой Ю.И. на позицию Амосовой.',
        hrn:'Суслова переведена на должность главного специалиста вместо Амосовой; ранее позиция Андреева.',hd:'2026-03-17'
      });
    }

    x=byName('Амосова Ольга Васильевна');
    if(x){
      Object.assign(x,{
        f:'Суслова Юлия Ивановна',s:'работает',r:1,
        op:'Главный инспектор',od:'11. Сектор мониторинга и рассмотрения обращений граждан',sec:null,
        nd:'отдел сопровождения',np:'главный специалист',o:'00ЗК-000026 от 16.07.2026 — перевод',rem:'да',
        m:'Позиция № 92 реестра от 17.07.2026. Суслова переведена вместо Амосовой; Амосова уволена 13.07.2026.',
        hrn:'Амосова уволена 13.07.2026; Черник уволена 26.01.2026.',hd:'2026-02-09'
      });
    }

    x=byName('Мильдзихова Зарина Алановна');
    if(x){
      Object.assign(x,{
        f:'Логинова Юлия Александровна',s:'работает',r:1,
        op:'Главный инспектор',od:'11. Сектор мониторинга и рассмотрения обращений граждан',sec:null,
        nd:'отдел сопровождения',np:'главный специалист',o:'003К-000001 от 18.07.2025',rem:null,
        m:'Позиция № 82 реестра от 17.07.2026. В актуальном реестре указана Логинова Ю.А.',
        hrn:'Ранее в карточке была Мильдзихова З.А.; актуальное ФИО по реестру — Логинова Ю.А.',hd:'2025-07-18'
      });
    }

    x=D.find(x=>x.id==='EMP-0162') || D.find(x=>x.f==='Вакансия ведущего специалиста');
    if(x){
      Object.assign(x,{
        f:'Тесленко Илья Денисович',s:'работает',r:1,
        op:null,od:null,sec:null,nd:'отдел сопровождения',np:'ведущий специалист',
        o:'00ЗК-000035 от 13.07.2026',rem:null,hd:'2026-07-15',
        m:'Позиция № 140 реестра от 17.07.2026. Принят с 15.07.2026; ранее позиция была вакантна.',
        hrn:'Позиция добавлена 22.06.2026; Тесленко принят с 15.07.2026.'
      });
    }

    if(!D.some(x=>x.f==='Вакансия начальника отдела' && x.z==='Дивин')){
      D.push({n:999,id:'EMP-0174',z:'Дивин',zf:'Дивин Александр Сергеевич',
        b:'Сектор анализа эффективности / Отдел сопровождения',d:'Сектор анализа эффективности / Отдел сопровождения',
        f:'Вакансия начальника отдела',s:'вакансия',r:1,i:null,
        m:'Позиция № 9 актуального кадрового реестра.',op:'Начальник отдела',
        od:'5. Управление анализа и мониторинга деятельности органов местного самоуправления и муниципальных организаций',
        sec:'Сектор анализа эффективности муниципальных организаций',nd:'отдел сопровождения',np:'начальник отдела',
        o:null,rem:null,hrn:'Вакансия начальника отдела.',hd:null});
    }

    const reductionNotices={
      'Мефёд':'29.06.2026','Никольский':'26.06.2026','Малькова':'30.06.2026',
      'Милосердова':'29.06.2026','Севостьянова':'29.06.2026','Дмитриева':'дата в списке не указана',
      'Федорова':'29.06.2026','Карасев':'08.07.2026','Брюзгина':'29.06.2026',
      'Егиазарова':'03.07.2026','Воронин':'30.06.2026','Тимофеев':'в отпуске до 12.07.2026; дата выдачи не указана',
      'Эльдаров':'29.09.2026','Немирова':'дата в списке не указана','Бакунов':'26.05.2026',
      'Чумакова':'29.06.2026','Жаров':'30.06.2026','Наумова':'26.06.2026',
      'Куракин':'26.06.2026','Матросов':'26.06.2026','Кирчигин':'13.07.2026'
    };
    for(const x of D){
      const surname=(x.f||'').trim().split(/\s+/)[0];
      if(Object.prototype.hasOwnProperty.call(reductionNotices,surname)){
        x.s='сокращение';
        const value=reductionNotices[surname];
        const note=value.includes('дата')||value.includes('отпуске')
          ? 'Сокращение: '+value+'.'
          : 'Сокращение: уведомление выдано '+value+'.';
        if(!(x.m||'').includes(note)) x.m=((x.m||'').trim()+' '+note).trim();
        if(!(x.hrn||'').includes(note)) x.hrn=((x.hrn||'').trim()+' '+note).trim();
      }
    }

    D.sort((a,b)=>(a.n||0)-(b.n||0));
    D.forEach((x,i)=>x.n=i+1);
    return 'const D='+JSON.stringify(D)+';\nconst HALF_EXTRA=';
  });

  html=html.replace(/const VACANCIES_SOURCE=(\[.*?\]);\nlet viewMode=/s,(all,json)=>{
    let V=JSON.parse(json);
    V=V.filter(x=>x.n!==140 && x.id!=='VAC-SRC-140');

    const required=[
      {n:7,id:'VAC-SRC-007',z:'УпрВнешКомм',zf:'Бурдуковская Р.З. (Упр. внешних коммуникаций и защиты информации)',
       b:'Сектор внешних коммуникаций / отдел внешних коммуникаций',d:'отдел внешних коммуникаций',
       f:'Вакансия — ведущий специалист',s:'вакансия',r:1,i:null,
       m:'Позиция № 7 реестра от 17.07.2026.',op:'Старший инспектор',
       od:'4. Управление информационного планирования и внешних коммуникаций',sec:'Сектор внешних коммуникаций',
       nd:'отдел внешних коммуникаций',np:'ведущий специалист',o:'00ЗК-00141 от 15.08.2025',rem:null,
       hrn:'Босянок уволена 15.06.2026.',hd:'2025-08-18'},
      {n:41,id:'VAC-SRC-041',z:'Викулова',zf:'Викулова Светлана Константиновна',
       b:'Сектор ЦОД / отдел сопровождения',d:'отдел сопровождения',f:'Вакансия — ведущий специалист',
       s:'вакансия',r:1,i:null,m:'Позиция № 41 реестра от 17.07.2026. Освободилась после перевода Сусловой.',
       op:'Старший инспектор',od:'10. Управление по развитию цифровых сервисов',sec:'Сектор ЦОД',
       nd:'отдел сопровождения',np:'ведущий специалист',o:'00ЗК-000017 от 17.03.2026',rem:null,
       hrn:'Суслова переведена на позицию № 92.',hd:'2026-03-17'},
      {n:141,id:'VAC-SRC-141',z:'Викулова',zf:'Викулова Светлана Константиновна',
       b:'Отдел сопровождения / проект ЦСТ',d:'отдел сопровождения',f:'Вакансия — главный аналитик',
       s:'вакансия',r:1,i:'ЦСТ',project:'ЦСТ',m:'Позиция № 141 реестра от 17.07.2026.',
       op:null,od:null,sec:null,nd:'отдел сопровождения',np:'главный аналитик',o:null,rem:null,
       hrn:'Добавлена с 22.06.2026; вакансия введена 01.05.2026.',hd:null}
    ];
    for(const a of required){
      const idx=V.findIndex(x=>x.id===a.id || x.n===a.n);
      if(idx>=0) V[idx]=a; else V.push(a);
    }
    V.sort((a,b)=>(a.n||9999)-(b.n||9999));
    return 'const VACANCIES_SOURCE='+JSON.stringify(V)+';\nlet viewMode=';
  });

  document.open();
  document.write(html);
  document.close();
})().catch(e=>{document.body.innerHTML='<pre style="white-space:pre-wrap;padding:24px">Ошибка загрузки дашборда: '+e+'</pre>';});
</script>
</body>
</html>
