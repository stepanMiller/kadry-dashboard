<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кадровый мониторинг</title>
</head>
<body>
<div style="font-family:Arial,sans-serif;padding:40px">Загрузка дашборда…</div>
<script>
(async()=>{
  const files=[
    'payload/dashboard08.part01.b64',
    'payload/dashboard08.part02.b64',
    'payload/dashboard08.part03.b64',
    'payload/dashboard08.part04.b64',
    'payload/dashboard08.part05.b64',
    'payload/dashboard08.part06.b64'
  ];
  const parts=await Promise.all(files.map(f=>fetch(f).then(r=>{
    if(!r.ok) throw new Error(`${f}: ${r.status}`);
    return r.text();
  })));
  const b64=parts.join('');
  const bin=atob(b64);
  const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
  const ds=new DecompressionStream('gzip');
  const html=await new Response(new Blob([bytes]).stream().pipeThrough(ds)).text();
  document.open();
  document.write(html);
  document.close();
})().catch(e=>{
  document.body.innerHTML='<pre style="white-space:pre-wrap;padding:24px">Ошибка загрузки дашборда: '+e+'</pre>';
});
</script>
</body>
</html>
