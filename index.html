<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Кадровый мониторинг</title>
</head>
<body>
<div style="font-family:Arial,sans-serif;padding:40px">Загрузка дашборда…</div>
<script>
(async()=>{
  const files=[
    'payload/exact08.part01.b64',
    'payload/exact08.part02.b64',
    'payload/exact08.part03.b64',
    'payload/exact08.part04.b64',
    'payload/exact08.part05.b64'
  ];
  const parts=await Promise.all(files.map(f=>fetch(f,{cache:'no-store'}).then(r=>{if(!r.ok) throw new Error(`${f}: ${r.status}`); return r.text();})));
  const bytes=Uint8Array.from(atob(parts.join('')),c=>c.charCodeAt(0));
  let html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();

  html=html.replace(/const D=(\[.*?\]);\nconst HALF_EXTRA=/s,(all,json)=>{
    let D=JSON.parse(json);

    // 1. Максаев — к Попову, не к Дивину.
    for(const x of D){
      if(x.f==='Максаев Максим Вадимович'){
        x.z='Попов';
        x.zf='Попов Антон Михайлович';
        x.b='ТКО / Отдел сопровождения';
        x.d='ТКО / Отдел сопровождения';
        x.m='Перенесён из блока Дивина в блок Попова по сверке с Google-таблицей и Excel-реестром.';
      }
    }

    // 2. Убираем техническую лишнюю строку Даниленко / Вакансия 2.
    D=D.filter(x=>!(x.id==='EMP-0163' && (x.f==='Вакансия главного аналитика'||x.f==='Вакансия 2')));

    // 3. Мефёд — действующий сотрудник по Excel-реестру.
    for(const x of D){
      if(x.f==='Мефёд Елена Геннадьевна'){
        x.s='работает';
        x.m='Статус уточнён по сверке с Excel-реестром: действующий сотрудник.';
      }
    }

    // 4. Добавляем недостающую позицию из Excel, строка 9: вакансия начальника отдела у Дивина.
    if(!D.some(x=>x.f==='Вакансия начальника отдела' && x.z==='Дивин')){
      D.push({
        n:999,
        id:'EMP-0174',
        z:'Дивин',
        zf:'Дивин Александр Сергеевич',
        b:'Сектор анализа эффективности / Отдел сопровождения',
        d:'Сектор анализа эффективности / Отдел сопровождения',
        f:'Вакансия начальника отдела',
        s:'вакансия',
        r:1,
        i:null,
        m:'Вакансия начальника отдела добавлена из Excel-реестра 08.07.2026, строка 9; относится к Дивину.',
        op:'Начальник отдела',
        od:'5. Управление анализа и мониторинга деятельности органов местного самоуправления и муниципальных организаций',
        sec:'Сектор анализа эффективности муниципальных организаций',
        nd:'отдел сопровождения',
        np:'начальник отдела',
        o:null,
        rem:null,
        hrn:'Добавлено по сверке с Excel-реестром: строка 9, вакансия начальника отдела.',
        hd:null
      });
    }

    D.sort((a,b)=>(a.n||0)-(b.n||0));
    D.forEach((x,i)=>x.n=i+1);
    return 'const D='+JSON.stringify(D)+';\nconst HALF_EXTRA=';
  });

  html=html.replace(/const VACANCIES_SOURCE=(\[.*?\]);\nlet viewMode=/s,(all,json)=>{
    let V=JSON.parse(json);

    // Приводим блок вакансий к Excel-выгрузке: 9 вакансий / 8,5 ставки.
    const additions=[
      {
        n:7,
        id:'VAC-SRC-007',
        z:'УпрВнешКомм',
        zf:'Бурдуковская Р.З. (Упр. внешних коммуникаций и защиты информации)',
        b:'Сектор внешних коммуникаций / отдел внешних коммуникаций',
        d:'отдел внешних коммуникаций',
        f:'Вакансия — ведущий специалист',
        s:'вакансия',
        r:1,
        i:null,
        m:'Вакансия из Excel-реестра 08.07.2026, позиция № 7. Учитывается для сверки вакансий с кадровой выгрузкой.',
        op:'Старший инспектор',
        od:'4. Управление информационного планирования и внешних коммуникаций',
        sec:'Сектор внешних коммуникаций',
        nd:'отдел внешних коммуникаций',
        np:'ведущий специалист',
        o:'003К-00141 от 15.08.2025',
        rem:null,
        hrn:'Босянок увол. 15.06.2026',
        hd:'2025-08-18'
      },
      {
        n:141,
        id:'VAC-SRC-141',
        z:'Викулова',
        zf:'Викулова Светлана Константиновна',
        b:'Отдел сопровождения / проект ЦСТ',
        d:'отдел сопровождения',
        f:'Вакансия — главный аналитик',
        s:'вакансия',
        r:1,
        i:'ЦСТ',
        project:'ЦСТ',
        m:'Вакансия из Excel-реестра 08.07.2026, позиция № 141. Добавлена для совпадения количества вакансий с кадровой выгрузкой.',
        op:null,
        od:null,
        sec:null,
        nd:'отдел сопровождения',
        np:'главный аналитик',
        o:null,
        rem:null,
        hrn:'Добавили с 22.06.2026; вакансия введена 01.05.2020.',
        hd:null
      }
    ];

    for(const a of additions){
      if(!V.some(x=>x.id===a.id)) V.push(a);
    }
    V.sort((a,b)=>(a.n||9999)-(b.n||9999));
    return 'const VACANCIES_SOURCE='+JSON.stringify(V)+';\nlet viewMode=';
  });

  document.open();
  document.write(html);
  document.close();
})().catch(e=>{document.body.innerHTML='<pre style="white-space:pre-wrap;padding:24px">Ошибка загрузки дашборда: '+e+'</pre>';});
</script>
</body>
</html>
